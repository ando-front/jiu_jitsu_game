<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BJJ Simulator — Stage 1 Prototype</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0b0e;
        color: #d8d8dc;
        font-family: ui-monospace, Menlo, Consolas, monospace;
      }
      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
      #debug-hud {
        position: absolute;
        top: 12px;
        left: 12px;
        padding: 10px 12px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid #2a2a30;
        border-radius: 6px;
        font-size: 12px;
        line-height: 1.45;
        white-space: pre;
        pointer-events: none;
        max-width: 440px;
      }
      #device-hint {
        position: absolute;
        bottom: 12px;
        left: 12px;
        padding: 6px 10px;
        background: rgba(0, 0, 0, 0.4);
        border-radius: 4px;
        font-size: 11px;
        color: #7b7b85;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="three-canvas"></canvas>
      <pre id="debug-hud">input: (waiting)</pre>
      <div id="device-hint">
        Stage 1 Prototype · Gamepad (Xbox/DualSense) or WASD/Arrows/F/J
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
